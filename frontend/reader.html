<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reading — Chinese Tracker</title>
<link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body>
<div id="nav"></div>
<main>
  <h1 id="title"></h1>
  <div id="content-row">
    <div id="video-container"></div>
    <div id="right-col">
      <div id="questions-bar">
        <div class="q-controls">
          <strong>Comprehension</strong>
          <button id="toggle-paste" class="secondary">✎ Add / paste questions</button>
        </div>
        <div id="paste-area" style="display:none;">
          <p class="q-status">
            Paste a JSON array of multiple-choice questions, then Save.
            <button id="copy-prompt" class="link-btn">Copy a prompt to generate them in any chatbot</button>
          </p>
          <textarea id="paste-json" rows="8" placeholder='[{"question":"…", "choices":["A","B","C","D"], "answer":0}]'></textarea>
          <div class="edit-row">
            <button id="save-questions">Save questions</button>
            <button id="clear-questions" class="danger">Clear all</button>
          </div>
          <p id="paste-msg" class="q-status"></p>
        </div>
        <div id="questions"></div>
      </div>
      <div class="reader-text" id="text"></div>
    </div>
  </div>
</main>
<div id="lookup-panel">
  <div class="placeholder">Click a word — or use ← → to move between words. Press 1 = known, 2 = learning, 3 = unknown.</div>
</div>

<script src="/static/app.js?v=2"></script>
<script>
document.getElementById("nav").innerHTML = navHtml("/read");

const textId = location.pathname.split("/").pop();
let activeTokenEl = null;
const wordSpans = [];       // all Chinese-word spans, in reading order
let currentIndex = -1;      // index into wordSpans of the selected word
let ytPlayer = null;        // embedded YouTube player (subtitle texts)
let videoEmbeddable = false;
let textPlain = "";         // plain text of the current text, for the chatbot prompt

function esc(s) {
  return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function youtubeId(url) {
  if (!url) return null;
  const m = url.match(/[?&]v=([\w-]+)/) || url.match(/youtu\.be\/([\w-]+)/) || url.match(/\/embed\/([\w-]+)/);
  return m ? m[1] : null;
}

// Build an inline YouTube player. disablekb:1 keeps the player from hijacking
// the 1/2/3 keys (which YouTube would otherwise use to seek to 10/20/30%) so
// they stay bound to word-status marking. Created once per page.
function setupVideo(videoUrl) {
  if (ytPlayer) return;
  const id = youtubeId(videoUrl);
  const container = document.getElementById("video-container");
  if (!id || !container) return;
  container.innerHTML = '<div class="video-wrap"><div class="yt-frame"><div id="yt-player"></div></div></div>';
  const create = () => {
    ytPlayer = new YT.Player("yt-player", {
      width: "100%", height: "100%", videoId: id,
      playerVars: { disablekb: 1, rel: 0, modestbranding: 1 },
    });
  };
  if (window.YT && window.YT.Player) {
    create();
  } else {
    window.onYouTubeIframeAPIReady = create;
    if (!document.getElementById("yt-api")) {
      const s = document.createElement("script");
      s.id = "yt-api";
      s.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(s);
    }
  }
}

function seekVideo(secs) {
  if (ytPlayer && ytPlayer.seekTo) {
    ytPlayer.seekTo(secs, true);
    if (ytPlayer.playVideo) ytPlayer.playVideo();
    // The player is sticky and always in view, so don't scroll — that would
    // yank the reader back to the top away from the line you just clicked.
  }
}

function hasRealEntry(entries) {
  return entries && entries.length > 0;
}

function renderEntries(entries) {
  if (!hasRealEntry(entries)) {
    return `<div class="definition" style="color:var(--muted);">No dictionary entry found — add one below.</div>`;
  }
  return entries
    .slice(0, 3)
    .map((e) => `<div class="definition"><span class="pinyin">${e.pinyin}</span> — ${e.definition}${e.source === "custom" ? ' <span class="status-badge learning" style="font-size:0.6rem;">custom</span>' : ""}</div>`)
    .join("");
}

function editControls(word) {
  const nextSpan = wordSpans[currentIndex + 1];
  const canMerge = currentIndex >= 0 && nextSpan;
  return `<div class="edit-row">
    ${word.length > 1 ? `<button class="secondary" onclick="splitWord()">✂ Split into characters</button>` : ""}
    ${canMerge ? `<button class="secondary" onclick="mergeNext()">Merge with «${nextSpan.dataset.word}» →</button>` : ""}
    <button class="secondary" onclick="toggleDefForm()">✎ Define</button>
  </div>
  <div id="def-form" style="display:none; margin-top:0.5rem;">
    <div style="display:flex; gap:0.5rem; align-items:center;">
      <input id="def-pinyin" placeholder="pinyin (auto)" style="max-width:140px;" />
      <input id="def-meaning" placeholder="definition / meaning" />
      <button onclick="saveDefinition()" style="white-space:nowrap;">Save</button>
    </div>
  </div>`;
}

function showLookup(word, entries, status) {
  const panel = document.getElementById("lookup-panel");
  const pinyin = entries[0] ? entries[0].pinyin : "";
  panel.innerHTML = `
    <span class="word">${word}</span>
    <span class="pinyin">${pinyin}</span>
    <span class="status-badge ${status}" style="margin-left:0.5rem;">${status}</span>
    ${renderEntries(entries)}
    <div class="actions">
      <button data-status="known" onclick="setStatus('${word}','known')">Known <kbd>1</kbd></button>
      <button data-status="learning" onclick="setStatus('${word}','learning')">Learning <kbd>2</kbd></button>
      <button data-status="unknown" class="secondary" onclick="setStatus('${word}','unknown')">Unknown <kbd>3</kbd></button>
    </div>
    ${editControls(word)}
  `;
  // If the word has no real definition, open the define form pre-filled.
  if (!hasRealEntry(entries)) toggleDefForm(true);
}

function toggleDefForm(forceOpen) {
  const form = document.getElementById("def-form");
  if (!form) return;
  const open = forceOpen === true ? true : form.style.display === "none";
  form.style.display = open ? "block" : "none";
  if (open && activeTokenEl) {
    const meaning = document.getElementById("def-meaning");
    const pin = document.getElementById("def-pinyin");
    const entries = JSON.parse(activeTokenEl.dataset.entries || "[]");
    if (entries[0]) { pin.value = entries[0].pinyin || ""; meaning.value = entries[0].definition || ""; }
    // Fetch a suggested pinyin for undefined words.
    if (!pin.value) {
      api(`/api/lookup?word=${encodeURIComponent(activeTokenEl.dataset.word)}`)
        .then((d) => { if (!pin.value) pin.value = d.suggested_pinyin || ""; });
    }
    meaning.focus();
  }
}

async function saveDefinition() {
  if (!activeTokenEl) return;
  const word = activeTokenEl.dataset.word;
  const pinyin = document.getElementById("def-pinyin").value.trim();
  const definition = document.getElementById("def-meaning").value.trim();
  if (!definition) return;
  const res = await api("/api/custom-definition", {
    method: "POST",
    body: JSON.stringify({ word, pinyin, definition }),
  });
  // Update every span of this word so the new definition is live everywhere.
  document.querySelectorAll(`.tok[data-word="${word}"]`).forEach((el) => {
    el.dataset.entries = JSON.stringify(res.entries);
  });
  showLookup(word, res.entries, spanStatus(activeTokenEl));
}

async function splitWord() {
  if (!activeTokenEl) return;
  const word = activeTokenEl.dataset.word;
  const selectOffset = activeTokenEl.dataset.offset;
  const scrollY = window.scrollY;
  const res = await api("/api/segmentation/override", {
    method: "POST",
    body: JSON.stringify({ action: "split", word }),
  });
  await load({ selectWord: res.new_word, selectOffset, scrollY });
}

async function mergeNext() {
  if (!activeTokenEl) return;
  const nextSpan = wordSpans[currentIndex + 1];
  if (!nextSpan) return;
  const selectOffset = activeTokenEl.dataset.offset;
  const scrollY = window.scrollY;
  const res = await api("/api/segmentation/override", {
    method: "POST",
    body: JSON.stringify({ action: "merge", word: activeTokenEl.dataset.word, next_word: nextSpan.dataset.word }),
  });
  await load({ selectWord: res.new_word, selectOffset, scrollY });
}

async function setStatus(word, status) {
  await api("/api/words/status", {
    method: "POST",
    body: JSON.stringify({ word, status }),
  });
  document.querySelectorAll(`.tok[data-word="${word}"]`).forEach((el) => {
    el.classList.remove("known", "learning", "unknown");
    el.classList.add(status);
  });
  if (activeTokenEl) {
    const entries = JSON.parse(activeTokenEl.dataset.entries || "[]");
    showLookup(word, entries, status);
  }
}

function spanStatus(span) {
  return span.classList.contains("known") ? "known"
    : span.classList.contains("learning") ? "learning" : "unknown";
}

function selectSpan(span, { scroll = false } = {}) {
  if (activeTokenEl) activeTokenEl.classList.remove("active");
  activeTokenEl = span;
  span.classList.add("active");
  currentIndex = wordSpans.indexOf(span);
  const entries = JSON.parse(span.dataset.entries || "[]");
  showLookup(span.dataset.word, entries, spanStatus(span));
  if (scroll) span.scrollIntoView({ block: "center", behavior: "smooth" });
  api("/api/lookups", {
    method: "POST",
    body: JSON.stringify({ word: span.dataset.word, text_id: parseInt(textId) }),
  });
}

let renderOffset = 0;   // running character position, used to re-find a word after an edit

function renderToken(tok) {
  const start = renderOffset;
  renderOffset += tok.text.length;
  if (!tok.is_chinese) {
    return document.createTextNode(tok.text);
  }
  const span = document.createElement("span");
  span.className = `tok ${tok.status}`;
  span.textContent = tok.text;
  span.dataset.word = tok.text;
  span.dataset.offset = start;
  span.dataset.entries = JSON.stringify(tok.entries);
  span.addEventListener("click", () => selectSpan(span));
  wordSpans.push(span);
  return span;
}

function formatTime(ms) {
  if (ms == null) return "";
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function renderArticle(container, text) {
  text.tokens.forEach((tok) => container.appendChild(renderToken(tok)));
}

function renderSubtitles(container, text) {
  text.lines.forEach((line) => {
    const row = document.createElement("div");
    row.className = "sub-line";

    const ts = document.createElement("span");
    ts.className = "sub-time";
    ts.textContent = formatTime(line.start_ms);
    if (text.video_url && line.start_ms != null) {
      const secs = Math.floor(line.start_ms / 1000);
      const link = document.createElement("a");
      link.textContent = formatTime(line.start_ms);
      if (videoEmbeddable) {
        link.href = "#";
        link.title = "Jump the video to this moment";
        link.addEventListener("click", (e) => { e.preventDefault(); seekVideo(secs); });
      } else {
        link.href = `${text.video_url}&t=${secs}s`;
        link.target = "_blank";
        link.rel = "noopener";
        link.title = "Open video at this moment";
      }
      ts.textContent = "";
      ts.appendChild(link);
    }
    row.appendChild(ts);

    const body = document.createElement("span");
    body.className = "sub-body";
    line.tokens.forEach((tok) => body.appendChild(renderToken(tok)));
    row.appendChild(body);

    container.appendChild(row);
  });
}

function moveSelection(delta) {
  if (wordSpans.length === 0) return;
  let next = currentIndex + delta;
  if (currentIndex === -1) next = delta > 0 ? 0 : wordSpans.length - 1;
  next = Math.max(0, Math.min(wordSpans.length - 1, next));
  selectSpan(wordSpans[next], { scroll: true });
}

const KEY_TO_STATUS = { "1": "known", "2": "learning", "3": "unknown" };

document.addEventListener("keydown", (e) => {
  const tag = (e.target && e.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  if (e.key === "ArrowRight" || e.key === "ArrowDown") {
    e.preventDefault();
    moveSelection(1);
  } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
    e.preventDefault();
    moveSelection(-1);
  } else if (KEY_TO_STATUS[e.key] && activeTokenEl) {
    e.preventDefault();
    setStatus(activeTokenEl.dataset.word, KEY_TO_STATUS[e.key]).then(() => {
      if (currentIndex < wordSpans.length - 1) moveSelection(1);
    });
  }
});

async function load(opts = {}) {
  const { selectWord, selectOffset, scrollY } = opts;
  const text = await api(`/api/texts/${textId}`);
  document.getElementById("title").textContent = text.title;
  const container = document.getElementById("text");
  container.innerHTML = "";
  wordSpans.length = 0;
  currentIndex = -1;
  activeTokenEl = null;
  renderOffset = 0;

  videoEmbeddable = !!(text.kind === "subtitle" && text.video_url && youtubeId(text.video_url));
  document.getElementById("content-row").classList.toggle("split", videoEmbeddable);
  if (videoEmbeddable) setupVideo(text.video_url);

  if (text.kind === "subtitle") {
    container.classList.add("subtitle-mode");
    renderSubtitles(container, text);
    textPlain = text.lines.map((l) => l.tokens.map((t) => t.text).join("")).join("\n");
  } else {
    renderArticle(container, text);
    textPlain = text.tokens.map((t) => t.text).join("");
  }
  loadQuestions();

  // After a split/merge edit, re-select the affected word WITHOUT jumping the
  // page: prefer the exact instance (same character offset), then restore the
  // reader's previous scroll position.
  if (selectOffset != null || selectWord) {
    let span = selectOffset != null
      ? wordSpans.find((s) => s.dataset.offset === String(selectOffset))
      : null;
    if (!span && selectWord) span = wordSpans.find((s) => s.dataset.word === selectWord);
    if (span) selectSpan(span, { scroll: false });
  }
  if (scrollY != null) window.scrollTo(0, scrollY);
}

// ----- Comprehension: stored multiple-choice questions -----

function renderQuestions(questions) {
  const out = document.getElementById("questions");
  if (!questions || !questions.length) {
    out.innerHTML = "";
    return;
  }
  out.innerHTML = questions.map((q, i) => `
    <div class="q-item" data-answer="${q.answer}">
      <div class="q-q">${i + 1}. ${esc(q.question)}</div>
      <div class="q-choices">
        ${q.choices.map((c, ci) =>
          `<button class="q-choice" data-i="${ci}">${String.fromCharCode(65 + ci)}. ${esc(c)}</button>`
        ).join("")}
      </div>
    </div>`).join("");
  out.querySelectorAll(".q-item").forEach((item) => {
    const ans = parseInt(item.dataset.answer, 10);
    item.querySelectorAll(".q-choice").forEach((btn) => {
      btn.addEventListener("click", () => {
        const chosen = parseInt(btn.dataset.i, 10);
        item.querySelectorAll(".q-choice").forEach((b) => {
          b.classList.remove("correct", "wrong");
          b.disabled = true;
          if (parseInt(b.dataset.i, 10) === ans) b.classList.add("correct");
        });
        if (chosen !== ans) btn.classList.add("wrong");
      });
    });
  });
}

async function loadQuestions() {
  try {
    const res = await api(`/api/texts/${textId}/questions`);
    renderQuestions(res.questions);
    // Pre-fill the editor with the current questions so they're easy to tweak.
    if (res.questions.length) {
      document.getElementById("paste-json").value = JSON.stringify(res.questions, null, 2);
    }
  } catch (e) { /* leave empty */ }
}

document.getElementById("toggle-paste").addEventListener("click", () => {
  const area = document.getElementById("paste-area");
  area.style.display = area.style.display === "none" ? "block" : "none";
});

document.getElementById("copy-prompt").addEventListener("click", async () => {
  const prompt =
    "You are a Mandarin Chinese reading-comprehension tutor. Read the Chinese text below and " +
    "write 4 multiple-choice questions in simplified Chinese (mix literal recall and light " +
    "inference). Each question has exactly 4 short choices in simplified Chinese, with one " +
    "correct. Output ONLY a JSON array — no markdown, no commentary — in exactly this shape:\n" +
    '[{"question":"…","choices":["…","…","…","…"],"answer":0}]\n' +
    'where "answer" is the 0-based index of the correct choice.\n\nText:\n' + textPlain;
  try {
    await navigator.clipboard.writeText(prompt);
    setMsg("Prompt copied — paste it into any chatbot, then paste its JSON back here.");
  } catch (e) {
    setMsg("Couldn't access the clipboard; select the prompt manually below.");
    document.getElementById("paste-json").value = prompt;
  }
});

document.getElementById("save-questions").addEventListener("click", async () => {
  const raw = document.getElementById("paste-json").value.trim();
  if (!raw) { setMsg("Paste some JSON first."); return; }
  let questions;
  try {
    questions = JSON.parse(raw);
    if (!Array.isArray(questions)) throw new Error("expected a JSON array");
  } catch (e) {
    setMsg("That isn't valid JSON: " + e.message);
    return;
  }
  try {
    const res = await api(`/api/texts/${textId}/questions`, {
      method: "PUT",
      body: JSON.stringify({ questions }),
    });
    renderQuestions(res.questions);
    setMsg(`Saved ${res.questions.length} question(s).`);
    document.getElementById("paste-area").style.display = "none";
  } catch (e) {
    setMsg("Error: " + e.message);
  }
});

document.getElementById("clear-questions").addEventListener("click", async () => {
  await api(`/api/texts/${textId}/questions`, { method: "DELETE" });
  document.getElementById("questions").innerHTML = "";
  document.getElementById("paste-json").value = "";
  setMsg("Cleared.");
});

function setMsg(text) {
  document.getElementById("paste-msg").textContent = text;
}

load();
</script>
</body>
</html>
